name: Supabase Keepalive

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping deployed keepalive endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "Missing KEEPALIVE_URL secret"
            exit 1
          fi

          curl --fail --show-error --silent "$KEEPALIVE_URL"
